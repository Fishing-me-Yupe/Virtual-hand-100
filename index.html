<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Virtual Hand</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    video {
      position: absolute;
      left: 0;
      top: 0;
      width: 320px;
      height: 240px;
      opacity: 0.3;
      z-index: 1;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>

<video id="webcam" autoplay playsinline></video>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.161/build/three.module.js";

import {
  HandLandmarker,
  FilesetResolver
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";


// =======================
// Three.js
// =======================

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  70,
  window.innerWidth / window.innerHeight,
  0.01,
  100
);

camera.position.z = 2;

const renderer = new THREE.WebGLRenderer({
  antialias: true
});

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);


// ライト
const light = new THREE.DirectionalLight(0xffffff, 3);
light.position.set(0, 1, 2);
scene.add(light);


// =======================
// 両手分の点を作る
// =======================

const handPoints = [];

for (let h = 0; h < 2; h++) {

  const points = [];

  for (let i = 0; i < 21; i++) {

    const geo = new THREE.SphereGeometry(0.03);

    const mat = new THREE.MeshStandardMaterial({
      color: h === 0 ? 0x00ffff : 0xff00ff
    });

    const mesh = new THREE.Mesh(geo, mat);

    scene.add(mesh);

    points.push(mesh);
  }

  handPoints.push(points);
}


// =======================
// Webcam
// =======================

const video = document.getElementById("webcam");

const stream = await navigator.mediaDevices.getUserMedia({
  video: true
});

video.srcObject = stream;


// =======================
// MediaPipe
// =======================

const vision = await FilesetResolver.forVisionTasks(
  "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
);

const handLandmarker =
  await HandLandmarker.createFromOptions(
    vision,
    {
      baseOptions: {
        modelAssetPath:
          "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
      },

      runningMode: "VIDEO",

      // ← ここを2に変更
      numHands: 2
    }
  );


// =======================
// Render Loop
// =======================

let lastVideoTime = -1;

async function render() {

  if (video.readyState >= 2) {

    if (lastVideoTime !== video.currentTime) {

      lastVideoTime = video.currentTime;

      const results =
        handLandmarker.detectForVideo(
          video,
          performance.now()
        );

      // 検知された手を全部処理
      for (let h = 0; h < results.landmarks.length; h++) {

        const landmarks = results.landmarks[h];

        for (let i = 0; i < landmarks.length; i++) {

          const p = landmarks[i];

          // 左右反転修正
          const x = -(p.x - 0.5) * 2;
          const y = -(p.y - 0.5) * 2;
          const z = -p.z;

          handPoints[h][i].position.set(
            x,
            y,
            z
          );
        }
      }
    }
  }

  renderer.render(scene, camera);

  requestAnimationFrame(render);
}

render();

</script>
</body>
</html>
