<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Virtual Hand - Both Hands, Line & Fill</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    video {
      position: absolute;
      left: 0;
      top: 0;
      width: 320px;
      height: 240px;
      opacity: 0.3;
      z-index: 1;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>

<video id="webcam" autoplay playsinline></video>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.161/build/three.module.js";

import {
  HandLandmarker,
  FilesetResolver
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

// ==========================================
// ★ 自由に変更できる設定（カスタマイズ枠）
// ==========================================
const CONFIG = {
  lineColor: 0x33ff57, // #あいうえおか（例：鮮やかな緑。0xの後に16進数）
  lineWidth: 0.015,    // 太さX（3D空間上の線の太さ）
  fillColor: 0x33ff57, // 塗りつぶしの色
  fillOpacity: 0.4     // 塗りつぶしの透明度（0.0=透明 〜 1.0=不透明）
};

// =======================
// Three.js セットアップ
// =======================

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  70,
  window.innerWidth / window.innerHeight,
  0.01,
  100
);
camera.position.z = 2;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ライト
const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
scene.add(ambientLight);

const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(0, 1, 2);
scene.add(light);


// ==========================================
// 接続パターンとメッシュの準備（両手分）
// ==========================================

const connections = [
  // 親指
  [1, 2], [2, 3], [3, 4],
  // 人差し指
  [5, 6], [6, 7], [7, 8],
  // 中指
  [9, 10], [10, 11], [11, 12],
  // 薬指
  [13, 14], [14, 15], [15, 16],
  // 小指
  [17, 18], [18, 19], [19, 20],
  // 手首から各指の甲の付け根への接続
  [0, 2],  // 手首 -> 親指第二関節
  [0, 5],  // 手首 -> 人差し指第三関節
  [0, 9],  // 手首 -> 中指第三関節
  [0, 13], // 手首 -> 薬指第三関節
  [0, 17]  // 手首 -> 小指第三関節
];

const lineMaterial = new THREE.MeshStandardMaterial({ color: CONFIG.lineColor });
const handPalmMaterial = new THREE.MeshStandardMaterial({
  color: CONFIG.fillColor,
  side: THREE.DoubleSide,
  transparent: true,
  opacity: CONFIG.fillOpacity
});

// 手のひらを塗りつぶすポリゴン用のインデックス
const indices = [0, 2, 5, 0, 5, 9, 0, 9, 13, 0, 13, 17];


// 片手分のメッシュ群を生成する関数
function createHandMeshes() {
  const lineMeshes = [];
  connections.forEach(() => {
    const geom = new THREE.CylinderGeometry(CONFIG.lineWidth, CONFIG.lineWidth, 1, 8);
    const mesh = new THREE.Mesh(geom, lineMaterial);
    scene.add(mesh);
    lineMeshes.push(mesh);
  });

  const handPalmGeometry = new THREE.BufferGeometry();
  handPalmGeometry.setIndex(indices);
  const handPalmMesh = new THREE.Mesh(handPalmGeometry, handPalmMaterial);
  scene.add(handPalmMesh);

  // 21点分のVector3配列
  const points = Array.from({ length: 21 }, () => new THREE.Vector3());

  return { lineMeshes, handPalmGeometry, handPalmMesh, points };
}

// 両手分のメッシュとデータを保持する配列
const hands = [createHandMeshes(), createHandMeshes()];


// =======================
// Webcam
// =======================

const video = document.getElementById("webcam");
const stream = await navigator.mediaDevices.getUserMedia({ video: true });
video.srcObject = stream;


// =======================
// MediaPipe
// =======================

const vision = await FilesetResolver.forVisionTasks(
  "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
);

const handLandmarker = await HandLandmarker.createFromOptions(
  vision,
  {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
    },
    runningMode: "VIDEO",
    numHands: 2 // ★ 両手対応
  }
);


// =======================
// シリンダー配置関数
// =======================
function updateCylinderLine(mesh, p1, p2) {
  const direction = new THREE.Vector3().subVectors(p2, p1);
  const length = direction.length();
  mesh.position.copy(p1).add(direction.multiplyScalar(0.5));
  mesh.scale.set(1, length, 1);
  mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction.clone().normalize());
  mesh.visible = true;
}


// =======================
// Render Loop
// =======================

let lastVideoTime = -1;

async function render() {

  if (video.readyState >= 2) {
    if (lastVideoTime !== video.currentTime) {
      lastVideoTime = video.currentTime;

      const results = handLandmarker.detectForVideo(video, performance.now());

      // 両手の全てのメッシュを一旦非表示に
      hands.forEach(hand => {
        hand.lineMeshes.forEach(m => m.visible = false);
        hand.handPalmMesh.visible = false;
      });

      // 検知された手に対してループ
      results.landmarks.forEach((landmarks, handIndex) => {
        // numHands=2でも片手しか検知されない場合があるため、存在する手だけ処理
        if (handIndex < hands.length) {
          const handData = hands[handIndex];
          const { lineMeshes, handPalmGeometry, handPalmMesh, points } = handData;

          // 1. 座標変換
          for (let i = 0; i < landmarks.length; i++) {
            const p = landmarks[i];
            points[i].set(
              (p.x - 0.5) * 2,
              -(p.y - 0.5) * 2,
              -p.z * 2
            );
          }

          // 2. 線（シリンダー）の更新
          connections.forEach((conn, connIndex) => {
            updateCylinderLine(lineMeshes[connIndex], points[conn[0]], points[conn[1]]);
          });

          // 3. 面（塗りつぶし）の更新
          const palmVertices = new Float32Array([
            points[0].x,  points[0].y,  points[0].z,
            points[2].x,  points[2].y,  points[2].z,
            points[5].x,  points[5].y,  points[5].z,
            points[9].x,  points[9].y,  points[9].z,
            points[13].x, points[13].y, points[13].z,
            points[17].x, points[17].y, points[17].z
          ]);
          
          handPalmGeometry.setAttribute('position', new THREE.BufferAttribute(palmVertices, 3));
          handPalmGeometry.computeVertexNormals();
          handPalmGeometry.attributes.position.needsUpdate = true;
          handPalmMesh.visible = true;
        }
      });
    }
  }

  renderer.render(scene, camera);
  requestAnimationFrame(render);
}

render();

</script>
</body>
</html>
