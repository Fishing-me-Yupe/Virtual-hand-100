<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Virtual Hand - Joint Palm & Realtime Config</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    video {
      position: absolute;
      left: 0;
      top: 0;
      width: 320px;
      height: 240px;
      opacity: 0.3;
      z-index: 1;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>

<video id="webcam" autoplay playsinline></video>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.161/build/three.module.js";

import {
  HandLandmarker,
  FilesetResolver
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

// ==========================================
// ★ ここを書き換えると、色や太さがリアルタイムに変わります！
// ==========================================
const CONFIG = {
  lineColor: 0x33ff57, // 線（骨格）の色（#あいうえおか の代わりに 0xあいうえおか）
  lineWidth: 0.015,    // 太さX（数値を大きくすると太くなります）
  fillColor: 0x33ff57, // 手のひら塗りつぶしの色
  fillOpacity: 0.4     // 塗りつぶしの透明度（0.0:透明 〜 1.0:べた塗り）
};

// =======================
// Three.js セットアップ
// =======================

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  70,
  window.innerWidth / window.innerHeight,
  0.01,
  100
);
camera.position.z = 2;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ライト
const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
scene.add(ambientLight);

const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(0, 1, 2);
scene.add(light);


// ==========================================
// 骨格の接続定義
// ==========================================

const connections = [
  // 各指の第一〜第三（第四）関節の接続
  [1, 2], [2, 3], [3, 4],       // 親指
  [5, 6], [6, 7], [7, 8],       // 人差し指
  [9, 10], [10, 11], [11, 12],  // 中指
  [13, 14], [14, 15], [15, 16], // 薬指
  [17, 18], [18, 19], [19, 20], // 小指
  
  // 手首から各指の付け根への接続（骨格線）
  [0, 1], [0, 5], [0, 9], [0, 13], [0, 17]
];

// 画像のイメージ通り、手のひらの外周を囲って塗りつぶすためのインデックス（三角形の組み合わせ）
// 頂点：0:手首, 1:親指付け根, 5:人差し指付け根, 9:中指付け根, 13:薬指付け根, 17:小指付け根
const palmIndices = [
  0, 1, 5,   // 手首 - 親指 - 人差し指
  0, 5, 9,   // 手首 - 人差し指 - 中指
  0, 9, 13,  // 手首 - 中指 - 薬指
  0, 13, 17  // 手首 - 薬指 - 小指
];


// 片手分の3Dオブジェクトを生成する共通関数
function createHandObjects() {
  const lineMeshes = [];
  
  // 各線（シリンダー）の生成
  connections.forEach(() => {
    // 最初の太さはCONFIGから取得（あとで毎フレーム更新します）
    const geom = new THREE.CylinderGeometry(CONFIG.lineWidth, CONFIG.lineWidth, 1, 8);
    const mat = new THREE.MeshStandardMaterial({ color: CONFIG.lineColor });
    const mesh = new THREE.Mesh(geom, mat);
    scene.add(mesh);
    lineMeshes.push(mesh);
  });

  // 手のひら塗りつぶし面の生成
  const palmGeometry = new THREE.BufferGeometry();
  palmGeometry.setIndex(palmIndices);
  const palmMaterial = new THREE.MeshStandardMaterial({
    color: CONFIG.fillColor,
    side: THREE.DoubleSide,
    transparent: true,
    opacity: CONFIG.fillOpacity
  });
  const palmMesh = new THREE.Mesh(palmGeometry, palmMaterial);
  scene.add(palmMesh);

  // 関節21点分の座標保存用
  const points = Array.from({ length: 21 }, () => new THREE.Vector3());

  return { lineMeshes, palmGeometry, palmMesh, points };
}

// 両手分のオブジェクトを用意
const hands = [createHandObjects(), createHandObjects()];


// =======================
// Webcam
// =======================

const video = document.getElementById("webcam");
const stream = await navigator.mediaDevices.getUserMedia({ video: true });
video.srcObject = stream;


// =======================
// MediaPipe
// =======================

const vision = await FilesetResolver.forVisionTasks(
  "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
);

const handLandmarker = await HandLandmarker.createFromOptions(
  vision,
  {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
    },
    runningMode: "VIDEO",
    numHands: 2
  }
);


// =======================
// 線（シリンダー）の位置・太さ・色を動的に更新する関数
// =======================
function updateCylinderLine(mesh, p1, p2) {
  const direction = new THREE.Vector3().subVectors(p2, p1);
  const length = direction.length();
  
  // 1. 位置と向きの計算
  mesh.position.copy(p1).add(direction.multiplyScalar(0.5));
  mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction.clone().normalize());
  
  // 2. CONFIGの太さ（半径）と長さをスケールにリアルタイム反映
  // Cylinderのデフォルト半径は1なので、CONFIG.lineWidthをそのままスケールに渡せば太さが変わります
  mesh.scale.set(CONFIG.lineWidth, length, CONFIG.lineWidth);
  
  // 3. CONFIGの色をリアルタイム反映
  mesh.material.color.setHex(CONFIG.lineColor);
  
  mesh.visible = true;
}


// =======================
// Render Loop
// =======================

let lastVideoTime = -1;

async function render() {

  if (video.readyState >= 2) {
    if (lastVideoTime !== video.currentTime) {
      lastVideoTime = video.currentTime;

      const results = handLandmarker.detectForVideo(video, performance.now());

      // 一旦すべての手を非表示にする
      hands.forEach(hand => {
        hand.lineMeshes.forEach(m => m.visible = false);
        hand.palmMesh.visible = false;
      });

      // 検知した手をループ処理
      results.landmarks.forEach((landmarks, handIndex) => {
        if (handIndex < hands.length) {
          const { lineMeshes, palmGeometry, palmMesh, points } = hands[handIndex];

          // ① 21マスの座標を取得・変換
          for (let i = 0; i < landmarks.length; i++) {
            const p = landmarks[i];
            points[i].set(
              (p.x - 0.5) * 2,
              -(p.y - 0.5) * 2,
              -p.z * 2
            );
          }

          // ② 骨格線の更新（太さと色もここで毎フレームCONFIGから読み込みます）
          connections.forEach((conn, connIndex) => {
            updateCylinderLine(lineMeshes[connIndex], points[conn[0]], points[conn[1]]);
          });

          // ③ 手のひら塗りつぶし面の更新（CONFIGの色と透明度をリアルタイム反映）
          palmMesh.material.color.setHex(CONFIG.fillColor);
          palmMesh.material.opacity = CONFIG.fillOpacity;

          // 画像のイメージ通り「手首(0) と 各指の付け根(1, 5, 9, 13, 17)」を結ぶ面を作る
          const palmVertices = new Float32Array([
            points[0].x,  points[0].y,  points[0].z,  // 0: 手首
            points[1].x,  points[1].y,  points[1].z,  // 1: 親指の付け根（一番手首側）
            points[5].x,  points[5].y,  points[5].z,  // 5: 人差し指の付け根
            points[9].x,  points[9].y,  points[9].z,  // 9: 中指の付け根
            points[13].x, points[13].y, points[13].z, // 13: 薬指の付け根
            points[17].x, points[17].y, points[17].z  // 17: 小指の付け根
          ]);
          
          palmGeometry.setAttribute('position', new THREE.BufferAttribute(palmVertices, 3));
          palmGeometry.computeVertexNormals();
          palmGeometry.attributes.position.needsUpdate = true;
          palmMesh.visible = true;
        }
      });
    }
  }

  renderer.render(scene, camera);
  requestAnimationFrame(render);
}

render();

</script>
</body>
</html>
